type: web
language: node
buildCommand: cd backend && npm install && npm run build || echo "Backend requires environment setup"
startCommand: cd backend && npm start
envVars:
  - key: JWT_SECRET
    scope: preview
  - key: MONGODB_URI
    scope: preview
  - key: CLIENT_ORIGIN
    scope: preview
  - key: PORT
    value: "10000"
    scope: preview
